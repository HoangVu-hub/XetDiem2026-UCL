<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Điểm Xét Tuyển - Đại Học Cửu Long</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #003087 0%, #0066cc 100%);
            color: #333;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: white;
            padding: 25px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        
        .logo {
            width: 110px;
            height: 110px;
            background: #003087;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 42px;
            font-weight: bold;
            box-shadow: 0 6px 20px rgba(0,0,0,0.25);
        }
        
        .header h1 {
            color: #003087;
            font-size: 32px;
            margin-bottom: 8px;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .buttons-container {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .btn {
            width: 320px;
            padding: 28px 20px;
            font-size: 22px;
            font-weight: 700;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .btn:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 20px 35px rgba(0,0,0,0.25);
        }
        
        .btn-hocba {
            background: white;
            color: #003087;
            border: 4px solid #003087;
        }
        
        .btn-diemthi {
            background: white;
            color: #0066cc;
            border: 4px solid #0066cc;
        }
        
        footer {
            text-align: center;
            padding: 25px;
            color: rgba(255,255,255,0.9);
            font-size: 15px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="logo-container">
            <div class="logo">DCL</div>
            <div>
                <h1>TRANG TÍNH ĐIỂM XÉT TUYỂN UCL 2026</h1>
                <p style="font-size: 20px; color: #555;">Trường Đại học Cửu Long</p>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <div class="main-content">
        <div class="buttons-container">
            <a href="TinhDiemXetTuyen2026.html" class="btn btn-hocba">
                📋 TÍNH ĐIỂM XÉT TUYỂN HỌC BẠ
            </a>
            <a href="TinhDiemXetTuyenThiTN2026.html" class="btn btn-diemthi">
                📝 TÍNH ĐIỂM XÉT TUYỂN ĐIỂM THI THPT
            </a>
        </div>
    </div>

    <footer>
        <p>© 2026 Đại Học Cửu Long - Công cụ hỗ trợ tính điểm xét tuyển</p>
        <p>Thông tin tuyển sinh chính thức vui lòng xem tại website trường</p>
    </footer>
</body>
</html>
