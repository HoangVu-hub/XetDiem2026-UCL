            {name: "Công nghệ kỹ thuật cơ khí (Máy chế biến thực phẩm) - (A00 ,A01 ,A03 ,C01 ,D01 ,X06 ,X07 ,X08 ,X10 ,X11)", combos: ["A00","A01","A03","C01","D01","X06","X07","X08","X10","X11"]},
            {name: "Công nghệ thực phẩm - (A00, A01, A02, A10, B00, C01, D01, D07, X11)", combos: ["A00","A01","A02","A10","B00","C01","D01","D07","X11"]},
            {name: "Công nghệ thực phẩm (Công nghệ bảo quản và chế biến nông sản) - (A00, A01, A02, A10, B00, C01, D01, D07, X11)", combos: ["A00","A01","A02","A10","B00","C01","D01","D07","X11"]},
            {name: "Công nghệ thực phẩm (Công nghệ bảo quản và chế biến thủy sản) - (A00, A01, A02, A10, B00, C01, D01, D07, X11)", combos: ["A00","A01","A02","A10","B00","C01","D01","D07","X11"]},
            {name: "Nông học - (A00, A01, A02, B00, B03, B08, D01, X12, X16)", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Nông học (Sản xuất giống nông nghiệp) - (A00, A01, A02, B00, B03, B08, D01, X12, X16)", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Nông học (Sản xuất giống nông nghiệp công nghệ cao) - (A00, A01, A02, B00, B03, B08, D01, X12, X16)", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Bảo vệ thực vật - (A00, A01, A02, B00, B03, B08, D01, X12, X16)", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Kinh doanh vật tư nông nghiệp - (A00, A01, A02, B00, B03, B08, D01, X12, X16)", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Nuôi trồng thủy sản - (A00, A01, A02, B00, B03, B08, D01, X12, X16)", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Thú y - (A00, A01, A02, B00, B03, B08, D01, X12, X16)", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Tiếng Việt & Văn hóa Việt Nam - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Tiếng Việt & Văn hóa Việt Nam (Ngữ văn học) - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Tiếng Việt & Văn hóa Việt Nam (Báo chí truyền thông) - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Tiếng Việt & Văn hóa Việt Nam (Quản lý văn hóa) - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Tiếng Việt & Văn hóa Việt Nam (Quản trị văn phòng) - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Đông phương học - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Đông phương học (Đông Nam á học) - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Đông phương học (Trung Quốc học) - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Đông phương học (Hàn Quốc học) - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Đông phương học (Nhật Bản học) - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Quan hệ công chúng - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Công tác xã hội - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Công tác xã hội (xã hội học) - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Truyền thông đa phương tiện - (A00, A01, D01, C00, C01, C03, C04, X02, X06)", combos: ["A00","A01","D01","C00","C01","C03","C04","X02","X06"]},
            {name: "Ngôn ngữ Anh - (A01, D01, D07, D08, D09, D10, D14, D15, X78)", combos: ["A01","D01","D07","D08","D09","D10","D14","D15","X78"]},
            {name: "Ngôn ngữ Anh (Tiếng anh thương mại) - (A01, D01, D07, D08, D09, D10, D14, D15, X78)", combos: ["A01","D01","D07","D08","D09","D10","D14","D15","X78"]},
            {name: "Trí tuệ nhân tạo - (A00, A01, C01, D01, D07, X02, X04, X06, X26)", combos: ["A00","A01","C01","D01","D07","X02","X04","X06","X26"]},
            {name: "Việt Nam học - (A01, A03, C00, C01, C03, C04, D01, D14, D15)", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Kinh tế số - (A00, A01, A03, C04, D01, X02, X05, X08, X26)", combos: ["A00","A01","A03","C04","D01","X02","X05","X08","X26"]}
        ];

        let selectedMajorIndex = null;
        let allScores = {};
        let currentSubjects = [];
        let currentSuggestionIndex = -1;

        const subjectMap = { /* ... giữ nguyên như cũ ... */ 
            "A00": ["Toán", "Vật Lý", "Hóa Học"], "A01": ["Toán", "Vật Lý", "Tiếng Anh"],
            "A02": ["Toán", "Vật Lý", "Sinh Học"], "A03": ["Toán", "Vật Lý", "Lịch Sử"],
            "A07": ["Toán", "Lịch Sử", "Địa Lý"], "A10": ["Toán", "Vật Lý", "GDCD"],
            "B00": ["Toán", "Hóa Học", "Sinh Học"], "B03": ["Toán", "Văn", "Sinh Học"],
            "B08": ["Toán", "Sinh Học", "Tiếng Anh"], "C00": ["Văn", "Lịch Sử", "Địa Lý"],
            "C01": ["Toán", "Văn", "Vật Lý"], "C03": ["Toán", "Văn", "Lịch Sử"],
            "C04": ["Toán", "Văn", "Địa Lý"], "C07": ["Văn", "Vật Lý", "Lịch Sử"],
            "C08": ["Văn", "Hóa Học", "Sinh Học"], "D01": ["Toán", "Văn", "Tiếng Anh"],
            "D07": ["Toán", "Hóa Học", "Tiếng Anh"], "D08": ["Toán", "Sinh Học", "Tiếng Anh"],
            "D09": ["Toán", "Lịch Sử", "Tiếng Anh"], "D10": ["Toán", "Văn", "Tiếng Anh"],
            "D14": ["Văn", "Lịch Sử", "Tiếng Anh"], "D15": ["Văn", "Địa Lý", "Tiếng Anh"],
            "X02": ["Toán", "Văn", "Tin Học"], "X04": ["Toán", "Văn", "Công nghệ NN"],
            "X05": ["Toán", "Vật Lý", "GD KTPL"], "X06": ["Toán", "Vật Lý", "Tin Học"],
            "X07": ["Toán", "Vật Lý", "Công nghệ CN"], "X08": ["Toán", "Vật Lý", "Công nghệ NN"],
            "X10": ["Toán", "Tin Học", "Công nghệ CN"],
            "X11": ["Toán", "Hóa Học", "Công nghệ CN"], "X12": ["Toán", "Hóa Học", "Công nghệ NN"],
            "X16": ["Toán", "Sinh Học", "Công nghệ NN"], "X17": ["Toán", "Lịch Sử", "GD KTPL"],
            "X21": ["Toán", "Địa Lý", "GD KTPL"], "X26": ["Toán", "Tin Học", "Tiếng Anh"],
            "X78": ["Văn", "GD KTPL", "Tiếng Anh"]
        };

        const comboLabel = { /* Giữ nguyên */ 
            "A00": "A00 (TLH)", "A01": "A01 (TLA)", "A02": "A02 (TLSi)", "A03": "A03 (TLSu)",
            "A07": "A07 (TSuD)", "A10": "A10 (TLGi)", "B00": "B00 (THSi)", "B03": "B03 (TVSi)",
            "B08": "B08 (TSiA)", "C00": "C00 (VSuD)", "C01": "C01 (TVL)", "C03": "C03 (TVSu)",
            "C04": "C04 (TVD)", "C07": "C07 (VLSu)", "C08": "C08 (VHSi)", "D01": "D01 (TVA)",
            "D07": "D07 (THA)", "D08": "D08 (TSiA)", "D09": "D09 (TSuA)", "D10": "D10 (TVA)",
            "D14": "D14 (VSuA)", "D15": "D15 (VDA)", "X02": "X02 (TVTi)", "X04": "X04 (TVN)",
            "X05": "X05 (TLP)", "X06": "X06 (TLTi)", "X07": "X07 (TLC)", "X08": "X08 (TLN)",
            "X10": "X10 (TTiC)",
            "X11": "X11 (THC)", "X12": "X12 (THN)", "X16": "X16 (TSiN)", "X17": "X17 (TSuP)",
            "X21": "X21 (TDP)", "X26": "X26 (TTiA)", "X78": "X78 (VPA)"
        };

        // Tìm kiếm ngành
        const majorSearch = document.getElementById('majorSearch');
        const suggestions = document.getElementById('suggestions');

        majorSearch.addEventListener('input', function() {
            const term = this.value.toLowerCase().trim();
            suggestions.innerHTML = '';
            currentSuggestionIndex = -1;
            suggestions.style.display = 'none';
            if (!term) return;

            const filtered = majors.map((m, i) => ({m, i})).filter(item =>
                item.m.name.toLowerCase().includes(term)
            );

            filtered.forEach((item) => {
                const div = document.createElement('div');
                div.className = "list-group-item list-group-item-action py-3 suggestion-item";
                div.textContent = item.m.name;
                div.dataset.index = item.i;
                div.onclick = () => selectMajor(item.i);
                suggestions.appendChild(div);
            });

            if (filtered.length > 0) suggestions.style.display = 'block';
        });

        majorSearch.addEventListener('keydown', function(e) {
            const items = suggestions.querySelectorAll('.suggestion-item');
            if (!items.length) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                currentSuggestionIndex = Math.min(currentSuggestionIndex + 1, items.length - 1);
                updateSuggestionHighlight(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                currentSuggestionIndex = Math.max(currentSuggestionIndex - 1, -1);
                updateSuggestionHighlight(items);
            } else if (e.key === 'Enter' && currentSuggestionIndex >= 0) {
                e.preventDefault();
                const selectedIndex = parseInt(items[currentSuggestionIndex].dataset.index);
                selectMajor(selectedIndex);
            } else if (e.key === 'Escape') {
                suggestions.style.display = 'none';
                currentSuggestionIndex = -1;
            }
        });

        function updateSuggestionHighlight(items) {
            items.forEach((item, idx) => {
                item.classList.toggle('active', idx === currentSuggestionIndex);
                if (idx === currentSuggestionIndex) item.scrollIntoView({ block: 'nearest' });
            });
        }

        function selectMajor(index) {
            selectedMajorIndex = index;
            majorSearch.value = majors[index].name;
            suggestions.style.display = 'none';
            currentSuggestionIndex = -1;

            const newSubjects = getAllSubjects(majors[index].combos);
            renderSubjectInputs(newSubjects);
          
            document.getElementById('scoreSection').classList.remove('d-none');
            document.getElementById('prioritySection').classList.remove('d-none');
            document.getElementById('resultSection').classList.add('d-none');
        }

        function getAllSubjects(comboList) {
            const subjects = new Set();
            comboList.forEach(c => {
                if (subjectMap[c]) subjectMap[c].forEach(s => subjects.add(s));
            });
            return Array.from(subjects);
        }

        function renderSubjectInputs(subjects) {
            currentSubjects = subjects;
            const tbody = document.getElementById('scoreTableBody');
            tbody.innerHTML = '';

            subjects.forEach(subject => {
                const row = document.createElement('tr');
                const avg = allScores[subject] ?
                    (((allScores[subject][10]||0) + (allScores[subject][11]||0) + (allScores[subject][12]||0)) / 3).toFixed(2) : "0.00";
                
                row.innerHTML = `
                    <td class="fw-medium">${subject}</td>
                    <td><input type="text" data-subject="${subject}" data-year="10" class="form-control text-center" maxlength="4" value="${allScores[subject]?.[10] || ''}"></td>
                    <td><input type="text" data-subject="${subject}" data-year="11" class="form-control text-center" maxlength="4" value="${allScores[subject]?.[11] || ''}"></td>
                    <td><input type="text" data-subject="${subject}" data-year="12" class="form-control text-center" maxlength="4" value="${allScores[subject]?.[12] || ''}"></td>
                    <td class="text-center avg-cell" id="avg-${subject.replace(/\s+/g, '')}">${avg}</td>
                `;
                tbody.appendChild(row);
            });

            const allInputs = Array.from(tbody.querySelectorAll('input'));
            const numSubjects = subjects.length;

            allInputs.forEach((input, idx) => {
                input.addEventListener('input', () => input.value = input.value.replace(/[^0-9.]/g, ''));
                input.addEventListener('blur', () => {
                    autoConvertScore(input);
                    updateAverage(input);
                    saveScore(input);
                });
                input.addEventListener('keydown', function(e) {
                    let nextIdx = -1;
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const col = idx % 3;
                        const row = Math.floor(idx / 3);
                        if (col === 0) {
                            if (row < numSubjects - 1) nextIdx = idx + 3;
                            else nextIdx = 1;
                        } else if (col === 1) {
                            if (row < numSubjects - 1) nextIdx = idx + 3;
                            else nextIdx = 2;
                        } else if (col === 2) {
                            if (row < numSubjects - 1) nextIdx = idx + 3;
                            else nextIdx = 0;
                        }
                    }
                    else if (e.key === 'ArrowRight') nextIdx = idx + 1;
                    else if (e.key === 'ArrowLeft') nextIdx = idx - 1;
                    else if (e.key === 'ArrowDown') nextIdx = idx + 3;
                    else if (e.key === 'ArrowUp') nextIdx = idx - 3;

                    if (nextIdx !== -1 && nextIdx < allInputs.length && nextIdx >= 0) {
                        allInputs[nextIdx].focus();
                        allInputs[nextIdx].select();
                    }
                });
            });
        }

        function saveScore(input) {
            const subject = input.dataset.subject;
            const year = parseInt(input.dataset.year);
            const value = parseFloat(input.value) || 0;
            if (!allScores[subject]) allScores[subject] = {};
            allScores[subject][year] = value;
        }

        function autoConvertScore(input) {
            let val = input.value.trim();
            if (!val) return;
            let num = parseFloat(val);
            if (isNaN(num)) return;
            if (num > 10 && num <= 100) input.value = (num / 10).toFixed(1);
            else if (num > 100) input.value = "10";
            else input.value = num.toFixed(1);
        }

        function updateAverage(input) {
            const row = input.parentElement.parentElement;
            const inputs = row.querySelectorAll('input');
            let sum = 0, count = 0;
            inputs.forEach(i => {
                let v = parseFloat(i.value);
                if (!isNaN(v)) { sum += v; count++; }
            });
            const avg = count ? (sum / count).toFixed(2) : "0.00";
            row.querySelector('.avg-cell').textContent = avg;
        }
// ====================== SỬA LỖI LÀM TRÒN ======================
        function roundTo2Decimals(num) {
            return Math.round(num * 100) / 100;
        }

        // ====================== HÀM TÍNH TOÁN ĐÃ ĐƯỢC CẬP NHẬT ======================
        function calculateScores() {
            if (selectedMajorIndex === null) return alert("Vui lòng chọn ngành!");
            
            const avgScores = {};
            let hasScore = false;

            Object.keys(allScores).forEach(subject => {
                const s = allScores[subject];
                const total = (s[10]||0) + (s[11]||0) + (s[12]||0);
                if (total > 0) {
                    hasScore = true;
                    avgScores[subject] = roundTo2Decimals(total / 3);
                }
            });

            if (!hasScore) return alert("Vui lòng nhập ít nhất một môn!");

            const priority = parseFloat(document.getElementById('kvSelect').value) + parseFloat(document.getElementById('utSelect').value);
            const major = majors[selectedMajorIndex];
            const results = [];

            major.combos.forEach(combo => {
                const needed = subjectMap[combo] || [];
                
                // === PHẦN MỚI: Kiểm tra xem đã nhập đủ điểm 3 năm cho tất cả môn chưa ===
                let isComplete = true;
                needed.forEach(sub => {
                    const scores = allScores[sub];
                    if (!scores || !scores[10] || !scores[11] || !scores[12]) {
                        isComplete = false;
                    }
                });

                let total = '-';
                let bonus = '-';
                let final = '-';
                let status = isComplete ? "" : "Thiếu cột điểm";

                if (isComplete) {
                    let sum = 0;
                    needed.forEach(sub => {
                        sum += avgScores[sub];
                    });
                    total = roundTo2Decimals(sum).toFixed(2);           // ← Sửa ở đây
                    
                    bonus = priority;
                    if (parseFloat(total) >= 22.5) {
                        bonus = Math.max(0, roundTo2Decimals(((30 - parseFloat(total)) / 7.5) * priority));
                    }
                    bonus = bonus.toFixed(2);
                    
                    final = roundTo2Decimals(parseFloat(total) + parseFloat(bonus)).toFixed(2);
                }

                results.push({
                    display: comboLabel[combo] || combo,
                    total: total,
                    bonus: bonus,
                    final: final,
                    status: status
                });
            });

            results.sort((a, b) => (a.final === '-' ? 1 : b.final === '-' ? -1 : parseFloat(b.final) - parseFloat(a.final)));
            renderResults(results);
        }

        function renderResults(results) {
            const tbody = document.querySelector('#resultTable tbody');
            tbody.innerHTML = '';
            results.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="fw-medium">${r.display}</td>
                    <td class="text-center">${r.total}</td>
                    <td class="text-center text-success">${r.bonus}</td>
                    <td class="text-center fw-bold fs-5 text-primary">${r.final}</td>
                    <!-- === PHẦN MỚI THÊM: Hiển thị Trạng thái === -->
                    <td class="text-center ${r.status === 'Đủ Điểm' ? 'status-sufficient' : 'status-missing'}">
                        ${r.status}
                    </td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('resultSection').classList.remove('d-none');
        }

        function resetForm() {
            allScores = {};
            document.getElementById('scoreTableBody').innerHTML = '';
            document.getElementById('scoreSection').classList.add('d-none');
            document.getElementById('prioritySection').classList.add('d-none');
            document.getElementById('resultSection').classList.add('d-none');
            majorSearch.value = '';
            selectedMajorIndex = null;
            suggestions.style.display = 'none';
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('#majorSearch')) {
                suggestions.style.display = 'none';
                currentSuggestionIndex = -1;
            }
        });
    </script>
