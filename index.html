<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tính Điểm Xét Tuyển Đại Học Cửu Long 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8f9fa; }
        .card { border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        .form-control, .form-select { border-radius: 12px; }
        .form-control:focus { border-color: #1e40af; box-shadow: 0 0 0 4px rgba(30, 64, 175, 0.15); }
        table th { background-color: #f8f9fa; font-weight: 600; text-align: center; }
        .avg-cell { font-weight: bold; color: #1e40af; font-size: 1.1rem; }
        .dropdown-item:hover { background-color: #f0f9ff; }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-5">
            <h1 class="display-5 fw-bold text-primary mb-1">🎓 TÍNH ĐIỂM XÉT TUYỂN</h1>
            <p class="lead text-muted">Đại học Cửu Long - Năm 2026</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-10 col-xl-9">

                <!-- Chọn ngành -->
                <div class="card mb-4">
                    <div class="card-body p-4">
                        <h5 class="card-title mb-3"><i class="fas fa-graduation-cap me-2"></i>Chọn ngành học</h5>
                        <div class="position-relative">
                            <input type="text" id="majorSearch" class="form-control form-control-lg" 
                                   placeholder="Tìm ngành (CNTT, Y khoa, Marketing...)">
                            <div id="suggestions" class="list-group position-absolute w-100 mt-2 shadow" 
                                 style="max-height: 420px; overflow-y: auto; z-index: 1060; border-radius: 12px; display: none;">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Nhập điểm -->
                <div id="scoreSection" class="card mb-4 d-none">
                    <div class="card-body p-4">
                        <h5 class="card-title mb-3">Nhập điểm trung bình 3 năm</h5>
                        <div class="table-responsive">
                            <table class="table table-bordered align-middle" id="scoreTable">
                                <thead>
                                    <tr>
                                        <th>Môn</th>
                                        <th>Lớp 10 (điểm)</th>
                                        <th>Lớp 11 (Điểm)</th>
                                        <th>Lớp 12 (Điểm)</th>
                                        <th>TBM 3 năm</th>
                                    </tr>
                                </thead>
                                <tbody id="scoreTableBody"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Ưu tiên -->
                <div id="prioritySection" class="card mb-4 d-none">
                    <div class="card-body p-4">
                        <h5 class="card-title mb-3"><i class="fas fa-medal me-2"></i>Điểm ưu tiên</h5>
                        <div class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Khu vực</label>
                                <select id="kvSelect" class="form-select">
                                    <option value="0">KV3 - Không (0.00)</option>
                                    <option value="0.25">KV2 (+0.25)</option>
                                    <option value="0.50">KV2-NT (+0.50)</option>
                                    <option value="0.75">KV1 (+0.75)</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-medium">Đối tượng ưu tiên</label>
                                <select id="utSelect" class="form-select">
                                    <option value="0">Không ưu tiên</option>
                                    <option value="1">UT2 (+1.00)</option>
                                    <option value="2">UT1 (+2.00)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="d-flex gap-3">
                    <button onclick="calculateScores()" class="btn btn-primary flex-grow-1 btn-lg py-3 fw-bold">
                        <i class="fas fa-calculator me-2"></i> TÍNH ĐIỂM XÉT TUYỂN
                    </button>
                    <button onclick="resetForm()" class="btn btn-outline-secondary btn-lg px-4">
                        <i class="fas fa-redo"></i> Nhập lại
                    </button>
                </div>

                <!-- Kết quả -->
                <div id="resultSection" class="card mt-5 d-none">
                    <div class="card-body p-4">
                        <h5 class="card-title mb-4">Kết quả xét tuyển</h5>
                        <div class="table-responsive">
                            <table class="table table-hover" id="resultTable">
                                <thead class="table-light">
                                    <tr>
                                        <th>Tổ hợp</th>
                                        <th class="text-center">Điểm tổ hợp</th>
                                        <th class="text-center">Điểm ưu tiên</th>
                                        <th class="text-center fw-bold">Điểm xét tuyển cuối cùng</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const majors = [
            {name: "Y khoa", combos: ["A00","A01","A02","B00","B03","B08","C01","C08","D07"]},
            {name: "Y học cổ truyền", combos: ["A00","A01","A02","B00","B03","B08","C01","C08","D07"]},
            {name: "Răng – Hàm – Mặt", combos: ["A00","A01","A02","B00","B03","B08","C01","C08","D07"]},
            {name: "Dược học", combos: ["A00","A01","A02","B00","B03","B08","C01","C08","D07"]},
            {name: "Kỹ thuật hình ảnh y học", combos: ["A00","A01","A02","B00","B03","B08","C01","C08","D07"]},
            {name: "Hộ sinh", combos: ["A00","A01","A02","B00","B03","B08","C01","C08","D07"]},
            {name: "Kỹ thuật xét nghiệm y học", combos: ["A00","A01","A02","B00","B03","B08","C01","C08","D07"]},
            {name: "Kỹ thuật phục hồi chức năng", combos: ["A00","A01","A02","B00","B03","B08","C01","C08","D07"]},
            {name: "Điều dưỡng", combos: ["A00","A01","A02","B00","B03","B08","C01","C08","D07"]},
            {name: "Marketing", combos: ["A00","A01","A03","C03","C04","D01","X02","X17","X21"]},
            {name: "Quản trị kinh doanh", combos: ["A00","A01","A03","C03","C04","D01","X02","X17","X21"]},
            {name: "Quản lý kinh tế", combos: ["A00","A01","A03","C03","C04","D01","X02","X17","X21"]},
            {name: "Kinh doanh thương mại", combos: ["A00","A01","A03","C03","C04","D01","X02","X17","X21"]},
            {name: "Tài chính – Ngân hàng", combos: ["A00","A01","A03","C04","D01","X02","X05","X08","X26"]},
            {name: "Công nghệ tài chính", combos: ["A00","A01","A03","C04","D01","X02","X05","X08","X26"]},
            {name: "Kế toán", combos: ["A00","A01","A03","C04","D01","X02","X05","X08","X26"]},
            {name: "Thiết kế đồ họa", combos: ["A00","A01","A07","C01","C04","D01","D09","D10","X02"]},
            {name: "Luật", combos: ["A00","A01","C00","C03","C07","D01","X02","X17","X21"]},
            {name: "Luật kinh tế", combos: ["A00","A01","C00","C03","C07","D01","X02","X17","X21"]},
            {name: "Quản trị dịch vụ du lịch và lữ hành", combos: ["A00","A01","C00","C03","C04","C07","D01","X17","X21"]},
            {name: "Công nghệ thông tin", combos: ["A00","A01","C01","D01","D07","X02","X04","X06","X26"]},
            {name: "Công nghệ kỹ thuật công trình xây dựng", combos: ["A00","A01","A03","C01","D01","X06","X07","X08","X11"]},
            {name: "Công nghệ kỹ thuật điện - điện tử", combos: ["A00","A01","A03","C01","D01","X06","X07","X08","X11"]},
            {name: "Công nghệ kỹ thuật ô tô", combos: ["A00","A01","A03","C01","D01","X06","X07","X08","X11"]},
            {name: "Công nghệ kỹ thuật cơ khí", combos: ["A00","A01","A03","C01","D01","X06","X07","X08","X11"]},
            {name: "Công nghệ thực phẩm", combos: ["A00","A01","A02","A10","B00","C01","D01","D07","X11"]},
            {name: "Nông học", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Bảo vệ thực vật", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Nuôi trồng thủy sản", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Thú y", combos: ["A00","A01","A02","B00","B03","B08","D01","X12","X16"]},
            {name: "Tiếng Việt & Văn hóa Việt Nam", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Đông phương học", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Quan hệ công chúng", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Công tác xã hội", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Truyền thông đa phương tiện", combos: ["A00","A01","D01","C00","C01","C03","C04","X02","X06"]},
            {name: "Ngôn ngữ Anh", combos: ["A01","D01","D07","D08","D09","D10","D14","D15","X78"]},
            {name: "Trí tuệ nhân tạo", combos: ["A00","A01","C01","D01","D07","X02","X04","X06","X26"]},
            {name: "Việt Nam học", combos: ["A01","A03","C00","C01","C03","C04","D01","D14","D15"]},
            {name: "Kinh tế số", combos: ["A00","A01","A03","C04","D01","X02","X05","X08","X26"]}
        ];

        let selectedMajorIndex = null;

        const subjectMap = {
            "A00": ["Toán", "Vật Lý", "Hóa Học"], "A01": ["Toán", "Vật Lý", "Tiếng Anh"],
            "A02": ["Toán", "Vật Lý", "Sinh Học"], "A03": ["Toán", "Vật Lý", "Lịch Sử"],
            "A04": ["Toán", "Vật Lý", "Địa Lý"], "A05": ["Toán", "Hóa Học", "Lịch Sử"],
            "A07": ["Toán", "Lịch Sử", "Địa Lý"], "A10": ["Toán", "Vật Lý", "GD KTPL"],
            "B00": ["Toán", "Hóa Học", "Sinh Học"], "B03": ["Toán", "Văn", "Sinh Học"],
            "B08": ["Toán", "Sinh Học", "Tiếng Anh"], "C00": ["Văn", "Lịch Sử", "Địa Lý"],
            "C01": ["Toán", "Văn", "Vật Lý"], "C03": ["Toán", "Văn", "Lịch Sử"],
            "C04": ["Toán", "Văn", "Địa Lý"], "C07": ["Văn", "Vật Lý", "Lịch Sử"],
            "C08": ["Văn", "Hóa Học", "Sinh Học"], "D01": ["Toán", "Văn", "Tiếng Anh"],
            "D07": ["Toán", "Hóa Học", "Tiếng Anh"], "D08": ["Toán", "Sinh Học", "Tiếng Anh"],
            "D09": ["Toán", "Lịch Sử", "Tiếng Anh"], "D10": ["Toán", "Văn", "Tiếng Anh"],
            "D14": ["Văn", "Lịch Sử", "Tiếng Anh"], "D15": ["Văn", "Địa Lý", "Tiếng Anh"],
            "X02": ["Toán", "Văn", "Tin Học"], "X04": ["Toán", "Văn", "Công nghệ NN"],
            "X05": ["Toán", "Vật Lý", "GD KTPL"], "X06": ["Toán", "Vật Lý", "Tin Học"],
            "X07": ["Toán", "Vật Lý", "Công nghệ CN"], "X08": ["Toán", "Vật Lý", "Công nghệ NN"],
            "X11": ["Toán", "Hóa Học", "Công nghệ CN"], "X12": ["Toán", "Hóa Học", "Công nghệ NN"],
            "X16": ["Toán", "Sinh Học", "Công nghệ NN"], "X17": ["Toán", "Lịch Sử", "GD KTPL"],
            "X21": ["Toán", "Địa Lý", "GD KTPL"], "X26": ["Toán", "Tin Học", "Tiếng Anh"],
            "X78": ["Văn", "GD KTPL", "Tiếng Anh"]
        };

        const comboLabel = {
            "A00": "A00 (TLH)", "A01": "A01 (TLA)", "A02": "A02 (TLS)", "A03": "A03 (TLL)",
            "A04": "A04 (TLD)", "A05": "A05 (THS)", "A07": "A07 (TLSĐ)", "A10": "A10 (TLG)",
            "B00": "B00 (THS)", "B03": "B03 (TVS)", "B08": "B08 (TSA)",
            "C00": "C00 (VSL)", "C01": "C01 (TVL)", "C03": "C03 (TVS)", "C04": "C04 (TVD)",
            "C07": "C07 (VVL)", "C08": "C08 (VHS)",
            "D01": "D01 (TVA)", "D07": "D07 (THA)", "D08": "D08 (TSA)", "D09": "D09 (TLA)",
            "D10": "D10 (TVA)", "D14": "D14 (VSA)", "D15": "D15 (VDA)",
            "X02": "X02 (TVT)", "X04": "X04 (TVN)", "X05": "X05 (TLG)", "X06": "X06 (TLT)",
            "X07": "X07 (TLC)", "X08": "X08 (TLN)", "X11": "X11 (THC)", "X12": "X12 (THN)",
            "X16": "X16 (TSN)", "X17": "X17 (TLG)", "X21": "X21 (TDG)", "X26": "X26 (TTA)",
            "X78": "X78 (VGA)"
        };

        // Tìm kiếm ngành
        const majorSearch = document.getElementById('majorSearch');
        const suggestions = document.getElementById('suggestions');

        majorSearch.addEventListener('input', function() {
            const term = this.value.toLowerCase().trim();
            suggestions.innerHTML = ''; suggestions.style.display = 'none';
            if (!term) return;

            const filtered = majors.map((m, i) => ({m, i})).filter(item => item.m.name.toLowerCase().includes(term));

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = "list-group-item list-group-item-action py-3";
                div.textContent = item.m.name;
                div.onclick = () => selectMajor(item.i);
                suggestions.appendChild(div);
            });
            if (filtered.length > 0) suggestions.style.display = 'block';
        });

        function selectMajor(index) {
            selectedMajorIndex = index;
            majorSearch.value = majors[index].name;
            suggestions.style.display = 'none';
            renderSubjectInputs(majors[index].combos);
            document.getElementById('scoreSection').classList.remove('d-none');
            document.getElementById('prioritySection').classList.remove('d-none');
            document.getElementById('resultSection').classList.add('d-none');
        }

        function getAllSubjects(comboList) {
            const subjects = new Set();
            comboList.forEach(c => subjectMap[c] && subjectMap[c].forEach(s => subjects.add(s)));
            return Array.from(subjects);
        }

        // ==================== ENTER LOGIC ĐÃ SỬA THEO YÊU CẦU ====================
        function renderSubjectInputs(comboList) {
            const tbody = document.getElementById('scoreTableBody');
            tbody.innerHTML = '';
            const subjects = getAllSubjects(comboList);

            subjects.forEach(subject => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td class="fw-medium">${subject}</td>
                    <td><input type="text" data-subject="${subject}" data-year="10" class="form-control text-center" maxlength="4"></td>
                    <td><input type="text" data-subject="${subject}" data-year="11" class="form-control text-center" maxlength="4"></td>
                    <td><input type="text" data-subject="${subject}" data-year="12" class="form-control text-center" maxlength="4"></td>
                    <td class="text-center avg-cell" id="avg-${subject.replace(/\s+/g, '')}">0.00</td>
                `;
                tbody.appendChild(row);
            });

            const allInputs = Array.from(tbody.querySelectorAll('input'));
            const numSubjects = subjects.length;

            allInputs.forEach((input, idx) => {
                input.addEventListener('input', () => input.value = input.value.replace(/[^0-9.]/g, ''));

                input.addEventListener('blur', () => {
                    autoConvertScore(input);
                    updateAverage(input);
                });

                input.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        autoConvertScore(this);
                        updateAverage(this);

                        const col = idx % 3;                    // 0=L10, 1=L11, 2=L12
                        const subjectIdx = Math.floor(idx / 3);

                        let nextIdx;

                        if (subjectIdx < numSubjects - 1) {
                            // Xuống môn tiếp theo, cùng cột
                            nextIdx = idx + 3;
                        } else {
                            // Hết môn của cột hiện tại → nhảy sang cột sau của môn đầu tiên
                            nextIdx = col + 1;
                        }

                        const nextInput = allInputs[nextIdx];
                        if (nextInput) {
                            nextInput.focus();
                            nextInput.select();
                        }
                    }
                });
            });
        }

        function autoConvertScore(input) {
            let val = input.value.trim();
            if (!val) return;
            let num = parseFloat(val);
            if (isNaN(num)) return;
            if (num > 10 && num <= 100) input.value = (num / 10).toFixed(1);
            else if (num > 100) input.value = "10";
            else input.value = num.toFixed(1);
        }

        function updateAverage(input) {
            const row = input.parentElement.parentElement;
            const inputs = row.querySelectorAll('input');
            let sum = 0, count = 0;
            inputs.forEach(i => {
                let v = parseFloat(i.value);
                if (!isNaN(v)) { sum += v; count++; }
            });
            const avg = count ? (sum / count).toFixed(2) : "0.00";
            row.querySelector('.avg-cell').textContent = avg;
        }

        function calculateScores() {
            if (selectedMajorIndex === null) return alert("Vui lòng chọn ngành!");

            const avgScores = {};
            let hasScore = false;

            document.querySelectorAll('#scoreTableBody tr').forEach(row => {
                const subject = row.querySelector('input').dataset.subject;
                const inputs = row.querySelectorAll('input');
                const scores = Array.from(inputs).map(i => parseFloat(i.value) || 0);
                if (scores.some(s => s > 0)) hasScore = true;
                avgScores[subject] = scores.reduce((a,b) => a + b, 0) / 3;
            });

            if (!hasScore) return alert("Vui lòng nhập điểm!");

            const priority = parseFloat(document.getElementById('kvSelect').value) + parseFloat(document.getElementById('utSelect').value);
            const major = majors[selectedMajorIndex];
            const results = [];

            major.combos.forEach(combo => {
                const needed = subjectMap[combo] || [];
                const isComplete = needed.every(sub => avgScores[sub] !== undefined && avgScores[sub] > 0);

                let total = '-';
                let bonus = '-';
                let final = '-';

                if (isComplete) {
                    total = needed.reduce((sum, sub) => sum + avgScores[sub], 0).toFixed(2);
                    bonus = priority;
                    if (parseFloat(total) >= 22.5) bonus = Math.max(0, ((30 - parseFloat(total)) / 7.5) * priority).toFixed(2);
                    else bonus = priority.toFixed(2);
                    final = (parseFloat(total) + parseFloat(bonus)).toFixed(2);
                }

                results.push({
                    combo: combo,
                    display: comboLabel[combo] || combo,
                    total: total,
                    bonus: bonus,
                    final: final
                });
            });

            results.sort((a, b) => {
                if (a.final === '-') return 1;
                if (b.final === '-') return -1;
                return parseFloat(b.final) - parseFloat(a.final);
            });

            renderResults(results);
        }

        function renderResults(results) {
            const tbody = document.querySelector('#resultTable tbody');
            tbody.innerHTML = '';

            results.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="fw-medium">${r.display}</td>
                    <td class="text-center">${r.total}</td>
                    <td class="text-center text-success">${r.bonus}</td>
                    <td class="text-center fw-bold fs-5 text-primary">${r.final}</td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('resultSection').classList.remove('d-none');
        }

        function resetForm() {
            document.getElementById('scoreTableBody').innerHTML = '';
            document.getElementById('scoreSection').classList.add('d-none');
            document.getElementById('prioritySection').classList.add('d-none');
            document.getElementById('resultSection').classList.add('d-none');
            majorSearch.value = '';
            selectedMajorIndex = null;
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('#majorSearch')) suggestions.style.display = 'none';
        });
    </script>
</body>
</html>
